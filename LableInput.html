<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- input : collect data from the user  -->
     <!-- label : heading of each data  -->

     <!-- type : related to data the type keeps changing  -->
      <!-- name : it will submit the data of each field into the url   -->
    <!-- for / id is used to connect / bind input tag and label tag  -->

    <label for="fn">First Name :</label>
    <input type="text" name="fname" id="fn">

    <br> <br>

    <label for="ln">Last Name :</label>
    <input type="text" name="lname" id="ln">

    <br> <br>

    <label>Gender : </label> 

    <input type="radio" name="gender" id="m">
    <label for="m">Male</label>

    <input type="radio" name="gender" id="f">
    <label for="f">Female</label>

   <br> <br>

   <label for="ag">Age : </label>
   <input type="number" name="age" id="ag">

    <br> <br> 

    <label for="db">Date Of Birth : </label>
    <input type="date" name="dob" id="db">


    <br> <br>

    <label for="ea"> Email Address : </label>
    <input type="email" name="email" id="ea">

    <br> <br>

    <label for="pass">Password : </label>
    <input type="password" name="pwd" id="pass">

    <br> <br>

    <label for="xyz">confirm Password : </label>
    <input type="password" name="conpwd" id="xyz">



</body>
</html>
